<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO SPORTS - Official Guild Verification</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="glow-text">ECHO SPORTS</h1>
            <p class="subtitle">OFFICIAL GUILD VERIFICATION SYSTEM</p>
        </div>

        <div class="search-box">
            <input type="number" id="memberIdInput" placeholder="Enter Your Free Fire ID..." autocomplete="off">
            <button id="verifyBtn" onclick="verifyMember()">VERIFY ID</button>
        </div>

        <div id="loadingEffect" class="loader-wrapper hidden">
            <div class="loader"></div>
            <p class="loading-text">SCANNING GUILD DATABASE...</p>
        </div>

        <div id="resultBox" class="result-card hidden">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
